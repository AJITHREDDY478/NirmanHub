<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 96" role="img" aria-labelledby="title desc">
  <title id="title">NirmanHub Logo</title>
  <desc id="desc">NirmanHub gradient cube icon with wordmark</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="55%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="50%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
  </defs>

  <g transform="translate(8 8)">
    <rect x="0" y="0" width="80" height="80" rx="22" fill="url(#bgGrad)" />
    <g fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M40 14 L60 25 L60 49 L40 60 L20 49 L20 25 Z" />
      <path d="M40 36 L60 25" opacity="0.9" />
      <path d="M40 36 L20 25" opacity="0.9" />
      <path d="M40 36 L40 60" opacity="0.9" />
    </g>
  </g>

  <g transform="translate(104 59)">
    <text x="0" y="0" font-family="Outfit, Space Grotesk, Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="0.2" fill="url(#textGrad)">NirmanHub</text>
  </g>
</svg>
